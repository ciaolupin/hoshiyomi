<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="theme-color" content="#150f22">
<title>✦ 星詠み ✦ - 読み込み中</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{
  font-family:'Hiragino Kaku Gothic ProN','Noto Sans JP',sans-serif;
  background:#150f22;
  color:#e8e0f0;
  height:100dvh;
  display:flex;
  flex-direction:column;
  align-items:center;
  justify-content:center;
  text-align:center;
  padding:24px;
}
.title{
  font-size:28px;
  color:#c9a84c;
  letter-spacing:0.15em;
  margin-bottom:8px;
}
.subtitle{
  font-size:12px;
  color:#7a6e85;
  letter-spacing:0.2em;
  text-transform:uppercase;
  margin-bottom:48px;
}
.stars-wrap{
  position:relative;
  width:80px;
  height:80px;
  margin-bottom:32px;
}
.star-ring{
  position:absolute;
  inset:0;
  border-radius:50%;
  border:2px solid transparent;
  border-top-color:#c9a84c;
  border-right-color:rgba(201,168,76,0.3);
  animation:spin 1.4s linear infinite;
}
.star-ring2{
  position:absolute;
  inset:12px;
  border-radius:50%;
  border:1.5px solid transparent;
  border-top-color:#7c5cbf;
  border-right-color:rgba(124,92,191,0.3);
  animation:spin 2s linear infinite reverse;
}
.star-center{
  position:absolute;
  inset:0;
  display:flex;
  align-items:center;
  justify-content:center;
  font-size:28px;
  animation:pulse 2s ease-in-out infinite;
}
@keyframes spin{to{transform:rotate(360deg)}}
@keyframes pulse{0%,100%{opacity:0.6;transform:scale(0.9)}50%{opacity:1;transform:scale(1.1)}}
.msg{
  font-size:15px;
  color:#9b90aa;
  line-height:1.8;
  max-width:280px;
  margin-bottom:24px;
}
.msg strong{color:#c9a84c}
.progress-wrap{
  width:200px;
  height:3px;
  background:rgba(255,255,255,0.08);
  border-radius:2px;
  overflow:hidden;
  margin-bottom:16px;
}
.progress-bar{
  height:100%;
  background:linear-gradient(90deg,#7c5cbf,#c9a84c);
  border-radius:2px;
  width:0%;
  transition:width 0.5s ease;
}
.status{
  font-size:11px;
  color:#7a6e85;
  letter-spacing:0.08em;
}
.dots span{
  animation:blink 1.4s infinite;
  opacity:0;
}
.dots span:nth-child(2){animation-delay:0.2s}
.dots span:nth-child(3){animation-delay:0.4s}
@keyframes blink{0%,100%{opacity:0}50%{opacity:1}}
</style>
</head>
<body>

<div class="title">✦ 星詠み ✦</div>
<div class="subtitle">Mystic Oracle</div>

<div class="stars-wrap">
  <div class="star-ring"></div>
  <div class="star-ring2"></div>
  <div class="star-center">✦</div>
</div>

<div class="msg">
  星々を呼び覚ましています<br>
  <strong>しばらくお待ちください</strong>
</div>

<div class="progress-wrap">
  <div class="progress-bar" id="bar"></div>
</div>

<div class="status">
  サーバー起動中<span class="dots"><span>.</span><span>.</span><span>.</span></span>
</div>

<script>
const bar = document.getElementById('bar');
let progress = 0;
let attempts = 0;
const maxAttempts = 30; // 最大60秒待つ

// プログレスバーをゆっくり進める
const progressTimer = setInterval(() => {
  if (progress < 85) {
    progress += Math.random() * 3;
    bar.style.width = Math.min(progress, 85) + '%';
  }
}, 800);

// サーバーが起動したか定期確認（2秒ごと）
async function checkServer() {
  attempts++;
  try {
    const res = await fetch('/api/health', { cache: 'no-store' });
    if (res.ok) {
      // 起動完了！プログレスを100%にしてリダイレクト
      clearInterval(progressTimer);
      bar.style.width = '100%';
      bar.style.background = '#3a9e8e';
      document.querySelector('.msg').innerHTML = '準備完了！<br><strong>星詠みを開きます ✦</strong>';
      document.querySelector('.status').textContent = '接続完了';
      setTimeout(() => {
        window.location.href = '/index.html';
      }, 800);
      return;
    }
  } catch(e) {
    // まだ起動していない
  }

  if (attempts < maxAttempts) {
    setTimeout(checkServer, 2000);
  } else {
    // タイムアウト
    document.querySelector('.msg').innerHTML = '起動に時間がかかっています<br><small style="color:#7a6e85">ページを再読み込みしてみてください</small>';
    document.querySelector('.status').textContent = '';
    bar.style.background = '#c4547a';
    bar.style.width = '100%';
  }
}

// 1秒後に確認開始
setTimeout(checkServer, 1000);
</script>
</body>
</html>
